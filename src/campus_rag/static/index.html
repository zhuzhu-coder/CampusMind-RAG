<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>校园知识库 RAG</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Campus Knowledge RAG</p>
          <h1>校园知识库 RAG</h1>
        </div>
        <div id="serviceStatus" class="status-pill status-muted">检查中</div>
      </header>

      <section class="panel control-panel" aria-label="问答控制台">
        <div class="panel-header">
          <div>
            <h2>问答</h2>
            <p id="statusText">正在检查知识库状态...</p>
          </div>
          <button id="warmupButton" class="secondary-button" type="button">预热知识库</button>
        </div>

        <label class="question-label" for="questionInput">问题</label>
        <textarea
          id="questionInput"
          rows="4"
          placeholder="例如：学生请假超过三天需要谁审批？"
        ></textarea>

        <div class="action-row">
          <label class="toggle-row">
            <input id="traceToggle" type="checkbox" />
            <span>显示调试信息</span>
          </label>
          <button id="askButton" class="primary-button" type="button">提交问题</button>
        </div>
      </section>

      <section id="errorPanel" class="panel error-panel hidden" aria-live="polite"></section>

      <section class="panel answer-panel" aria-label="回答">
        <div class="panel-header">
          <h2>回答</h2>
          <div id="metaInfo" class="meta-info">等待提问</div>
        </div>
        <div id="answerText" class="answer-text empty-state">答案会显示在这里。</div>
      </section>

      <section class="panel sources-panel" aria-label="来源">
        <div class="panel-header">
          <h2>来源</h2>
          <span id="sourceCount" class="meta-info">0 条</span>
        </div>
        <div id="sourcesList" class="sources-list empty-state">来源会显示在这里。</div>
      </section>

      <section id="tracePanel" class="panel trace-panel hidden" aria-label="调试信息">
        <div class="panel-header">
          <h2>Trace</h2>
          <span class="meta-info">RAG 链路耗时</span>
        </div>
        <div id="traceContent" class="trace-grid"></div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
